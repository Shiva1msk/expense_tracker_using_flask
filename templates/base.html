<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Expense Tracker{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-6 py-3 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 text-xl font-bold text-blue-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                Expense Tracker
            </a>
            {% block nav_links %}
            <div class="flex items-center gap-1 text-sm font-medium">
                <a href="/dashboard" class="px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-blue-600 transition">Dashboard</a>
                <a href="/expenses" class="px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-blue-600 transition">Expenses</a>
                <a href="/salaries" class="px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-green-600 transition">Salaries</a>
            </div>
            {% endblock %}
        </div>
    </nav>

    <!-- Flash messages -->
    <div class="max-w-4xl mx-auto w-full px-6 pt-4">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flex items-center gap-3 bg-blue-50 border border-blue-200 text-blue-700 px-4 py-3 rounded-lg mb-3">
                        <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                        </svg>
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <!-- Main content -->
    <main class="flex-1 max-w-4xl mx-auto w-full px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-200 bg-white mt-auto">
        <div class="max-w-4xl mx-auto px-6 py-4 text-center text-sm text-gray-400">
            &copy; 2026 Expense Tracker
        </div>
    </footer>

</body>
</html>
