{% extends "base.html" %}
{% block title %}Edit Expense{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="mb-6">
        <a href="/expenses/view" class="text-sm text-gray-400 hover:text-gray-600 transition flex items-center gap-1 mb-3">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Back
        </a>
        <h1 class="text-2xl font-bold text-gray-800">Edit Expense</h1>
        <p class="text-gray-500 mt-1">Update the expense details</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <form action="" method="post" class="space-y-5">
            <div>
                <label for="expense_name" class="block text-sm font-medium text-gray-700 mb-1.5">Expense Name</label>
                <input type="text" name="expense_name" id="expense_name" value="{{ expense.expense_name }}"
                    class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
            </div>
            <div>
                <label for="category" class="block text-sm font-medium text-gray-700 mb-1.5">Category</label>
                <select name="category" id="category"
                    class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if cat == expense.category %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="expense_amount" class="block text-sm font-medium text-gray-700 mb-1.5">Amount</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-medium">₹</span>
                    <input type="text" name="expense_amount" id="expense_amount" value="{{ expense.expense_amount }}"
                        class="w-full border border-gray-300 rounded-xl pl-8 pr-4 py-2.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
            </div>
            <div class="flex gap-3 pt-1">
                <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition font-semibold shadow-sm">Update</button>
                <a href="/expenses/view" class="flex-1 text-center border border-gray-300 text-gray-600 py-3 rounded-xl hover:bg-gray-50 transition font-medium">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
