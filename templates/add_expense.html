{% extends "base.html" %}
{% block title %}Add Expense{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="mb-6">
        <a href="/expenses" class="text-sm text-gray-400 hover:text-gray-600 transition flex items-center gap-1 mb-3">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Back to Expenses
        </a>
        <h1 class="text-2xl font-bold text-gray-800">Add Expense</h1>
        <p class="text-gray-500 mt-1">Record a new expense entry</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <form method="post" class="space-y-5">
            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm">{{ error }}</div>
            {% endif %}
            <div>
                <label for="expense_name" class="block text-sm font-medium text-gray-700 mb-1.5">Expense Name</label>
                <input type="text" name="expense_name" id="expense_name" placeholder="e.g. Groceries"
                    class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
            </div>
            <div>
                <label for="category" class="block text-sm font-medium text-gray-700 mb-1.5">Category</label>
                <select name="category" id="category"
                    class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="expense_amount" class="block text-sm font-medium text-gray-700 mb-1.5">Amount</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-medium">₹</span>
                    <input type="text" name="expense_amount" id="expense_amount" placeholder="0.00"
                        class="w-full border border-gray-300 rounded-xl pl-8 pr-4 py-2.5 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition font-semibold shadow-sm">Add Expense</button>
        </form>
    </div>
</div>
{% endblock %}
